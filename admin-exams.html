<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>考古題審核後台 | Wycst P</title>
  <link rel="stylesheet" href="style.css">

  <style>
    html, body { overflow-x: hidden; }

    .admin-container {
      max-width: 1200px;
      margin: 30px auto 80px;
      padding: 0 20px;
    }

    .admin-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .review-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f2ece2;
      padding: 15px 10px;
      gap: 20px;
      transition: background 0.2s;
    }

    .review-item:hover {
      background: #faf8f5;
    }

    .review-thumb-wrapper {
      width: 60px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e2d9cd;
      background: #f8fafc;
      flex-shrink: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
    }

    .review-info {
      flex: 2;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 15px;
      align-items: center;
    }

    .book-main h4 {
      margin: 0 0 5px 0;
      color: #43392f;
      font-size: 16px;
    }

    .book-main p {
      margin: 0;
      font-size: 13px;
      color: #8a7a66;
    }

    .book-meta p {
      margin: 2px 0;
      font-size: 13px;
      color: #5f5142;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-approved {
      background: #d4edda;
      color: #155724;
    }

    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }

    .action-btns {
      display: flex;
      gap: 10px;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 8px;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      color: white;
      font-weight: bold;
    }

    .btn-approve {
      background-color: #28a745;
    }

    .btn-reject {
      background-color: #dc3545;
    }

    @media (max-width: 992px) {
      .review-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .review-info {
        grid-template-columns: 1fr;
        width: 100%;
        gap: 10px;
      }

      .review-thumb-wrapper {
        width: 80px;
        height: 106px;
      }
    }
  </style>
</head>

<body>

<header class="hero" style="min-height: auto; padding: 40px 20px;">
  <h1>考古題審核後台</h1>
  <p class="subtitle">Exams Review List - Wycst P</p>

  <button onclick="logout()" style="background-color: #5f5142; color: white; padding: 6px 18px; border-radius: 12px; cursor: pointer; margin-top: 15px; font-size:14px;">
    登出後台
  </button>
</header>

<div class="admin-container">
  <div class="admin-card">
    <div id="review-list">
      <p style="text-align:center; color:#8a7a66;">
        ⚡ 安全驗證登入身分中...
      </p>
    </div>
  </div>
</div>

<footer>
  <p>© Wycst P</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
let hasLoaded = false;

supabaseClient.auth.onAuthStateChange((event, session) => {
  if (session) {
    if (!hasLoaded) {
      hasLoaded = true;
      loadRequests();
    }
  } else {
    setTimeout(() => {
      window.location.href = "login.html";
    }, 100);
  }
});

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

async function loadRequests() {
  const container = document.getElementById("review-list");

  const { data, error } = await supabaseClient
    .from("exams")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    container.innerHTML =
      `<p style="color:#dc3545; text-align:center;">❌ 讀取失敗：${error.message}</p>`;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML =
      "<p style='text-align:center; color:#8a7a66;'>目前沒有任何考古題申請資料。</p>";
    return;
  }

  container.innerHTML = "";

  data.forEach(exam => {
    let badgeClass = "status-pending";
    let badgeText = "⏳ 待審核";

    if (exam.status === "approved") {
      badgeClass = "status-approved";
      badgeText = "🟢 已核准";
    }

    if (exam.status === "rejected") {
      badgeClass = "status-rejected";
      badgeText = "🔴 已拒絕";
    }

    container.innerHTML += `
      <div class="review-item">

        <div class="review-thumb-wrapper">
          📄
        </div>

        <div class="review-info">

          <div class="book-main">
            <h4>${exam.title || exam.course_name}</h4>
            <p><strong>說明：</strong>${exam.description || "無備註。"}</p>
          </div>

          <div class="book-meta">
            <p>🎓 <strong>${exam.department || "通識 / 其他"}</strong></p>
            <p>📖 ${exam.course_name || "未填"}</p>
            <p>👨‍🏫 ${exam.professor || "未填"}</p>
            <p>📅 ${exam.year || "未填年份"}</p>
          </div>

          <div class="book-meta">
            <p>👤 ${exam.seller_name || "匿名"}</p>

            <a href="${exam.line_id || "#"}" target="_blank" style="color:#007AFF; font-size:12px; text-decoration:underline;">
              🔗 檢視聯絡資料
            </a>

            <br>

            <a href="${exam.file_url || "#"}" target="_blank" style="color:#a89072; font-size:12px; text-decoration:underline;">
              📄 查看考古題檔案
            </a>
          </div>

        </div>

        <div style="text-align:right; display:flex; flex-direction:column; gap:8px; align-items:flex-end;">

          <span class="status-badge ${badgeClass}">
            ${badgeText}
          </span>

          <div class="action-btns">

            <button onclick="updateStatus('${exam.id}', 'approved')" class="btn-sm btn-approve">
              👍 核准
            </button>

            <button onclick="updateStatus('${exam.id}', 'rejected')" class="btn-sm btn-reject">
              ❌ 拒絕
            </button>

          </div>

        </div>

      </div>
    `;
  });
}

async function updateStatus(id, status) {
  const { error } = await supabaseClient
    .from("exams")
    .update({
      status: status
    })
    .eq("id", id);

  if (error) {
    alert("更新失敗：" + error.message);
    return;
  }

  loadRequests();
}
</script>

</body>
</html>
