<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>二手書市集 | Wycst P</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { overflow-x: hidden; }

    /* 搜尋與篩選控制台 */
    .search-container { max-width: 1000px; margin: -30px auto 30px; padding: 0 20px; }
    .search-card {
      background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(138, 122, 102, 0.06);
      border: 1px solid #f2ece2; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
    }
    .search-input-group { flex: 2; min-width: 250px; }
    .filter-select-group { flex: 1.5; min-width: 220px; }
    
    .search-card input {
      width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; box-sizing: border-box; outline: none;
    }
    
    .search-card select {
      width: 100%; padding: 12px 35px 12px 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; box-sizing: border-box; outline: none;
      background-color: #fff; color: #333; transition: border-color 0.2s;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%235f5142' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;
    }
    .search-card input:focus, .search-card select:focus { border-color: #a89072; }
    
    /* 按鈕樣式調整 */
    .search-btn {
      padding: 12px 24px; background: #43392f; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;
    }
    .search-btn:hover { background: #5f5142; }

    .clear-btn {
      padding: 12px 20px; background: #f1ebe2; color: #5f5142; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;
    }
    .clear-btn:hover { background: #e5ded4; }

    /* 書籍網格與卡片排版 */
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; align-items: stretch; }
    .book-card { display: flex; flex-direction: column; height: 100%; box-sizing: border-box; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 24px rgba(138, 122, 102, 0.06); border: 1px solid #f2ece2; transition: transform 0.2s; }
    .book-card:hover { transform: translateY(-5px); }

    /* PTCG 黃金比例對齊外框：強迫 3:4 */
    .book-image-wrapper { width: 100%; aspect-ratio: 3 / 4; overflow: hidden; background-color: #f8fafc; position: relative; }
    .book-image-wrapper img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
    
    /* 質感科系標籤 */
    .dept-badge {
      position: absolute; top: 10px; left: 10px; background: rgba(67, 57, 47, 0.85); color: white; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold;
      backdrop-filter: blur(4px); 
      z-index: 2;
    }

    .book-info { display: flex; flex-direction: column; flex: 1; padding: 15px; }
    
    /* 現代標準 CSS：避開 VSC 的 webkit 錯誤限制 */
    .book-card h3 { 
      margin: 0 0 8px 0; font-size: 16px; color: #43392f; 
      line-clamp: 2;
      overflow: hidden; 
      display: block;
    }
    
    .book-description-area { flex: 1; margin-bottom: 12px; }
    .book-description-area p { margin: 4px 0; font-size: 13px; color: #5f5142; }
    
    .book-meta-desc { 
      color: #8a7a66 !important; font-size: 12px !important; margin-top: 6px !important; 
      line-clamp: 2;
      overflow: hidden; 
      display: block;
    }

    .front-contact-btn { 
      display: inline-block; color: white !important; padding: 12px 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 13px; margin-top: 10px; width: 100%; box-sizing: border-box; text-align: center; transition: opacity 0.2s; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      appearance: none;
    }
    .front-contact-btn:hover { opacity: 0.9; }

    @media (max-width: 576px) {
      .search-card { padding: 12px; gap: 8px; }
      .search-input-group, .filter-select-group { flex: 1; min-width: 100%; }
      .search-btn, .clear-btn { width: 48%; text-align: center; flex: 1; }
      .book-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 5px; }
      .book-card h3 { font-size: 14px; }
      .front-contact-btn { padding: 10px 8px; font-size: 12px; border-radius: 10px; }
    }
  </style>
</head>
<body>

<header class="hero">
 <nav class="navbar">

   <a href="index.html">首頁</a>

  <a href="books.html">📚 二手書</a>

  <a href="notes.html">📝 筆記</a>

  <a href="exams.html">📄 考古題</a>

  <a href="sell-book.html">📖 刊登二手書</a>

  <a href="sell-note.html">✏️ 上傳筆記</a>

  <a href="sell-exam.html">📂 上傳考古題</a>

  <a href="about.html">關於我們</a>
  
  <a href="terms.html">平台規章</a>
</nav>
  <h1>二手書市集</h1>
  <p class="subtitle">Find the books you need.</p>
</header>

<div class="search-container">
  <div class="search-card">
    <div class="search-input-group">
      <input type="text" id="searchBar" onkeydown="if(event.key==='Enter') executeSearch()" placeholder="🔍 輸入書名、教授、科目進行搜尋...">
    </div>
    <div class="filter-select-group">
      <select id="deptFilter">
        <option value="ALL">🎓 全部科系領域</option>
        <option value="商學院">💼 商學院 (經/會/企管/貿/財精/資管)</option>
        <option value="法學院">⚖️ 法學院 (法律系)</option>
        <option value="巨量資料管理學院">💻 巨量資料管理學院 (資科)</option>
        <option value="人文社會學院">✍️ 人社院 (中/史/哲/政/社/社工/音)</option>
        <option value="外國語文學院">🌍 外語學院 (英/日/德)</option>
        <option value="理學院">🔬 理學院 (數/物/化/微/心)</option>
        <option value="通識 / 其他">🏫 通識 / 其他</option>
      </select>
    </div>
    <button class="search-btn" onclick="executeSearch()">🔍 立即查詢</button>
    <button class="clear-btn" onclick="resetFilters()">重置</button>
  </div>
</div>

<section class="product-section">
  <div id="book-list" class="book-grid"></div>
</section>

<footer>
  <p>© Wycst P</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
/* global supabaseClient */

let allBooks = []; 
let isDataLoaded = false;

async function loadBooks() {
  const container = document.getElementById("book-list");
  container.innerHTML = "<p style='text-align:center; color:#8a7a66;'>⚡ 正在同步最新書籍清單...</p>";

  const { data, error } = await supabaseClient
    .from("books")
    .select("*")
    .eq("status", "approved")
    .order("created_at", { ascending: false });

  if (error) {
    container.innerHTML = "<p style='text-align:center;'>二手書讀取失敗。</p>";
    return;
  }
  
  allBooks = data || []; 
  isDataLoaded = true;
  // 一開始加載時，直接顯示全部
  renderBooks(allBooks);
}

function renderBooks(booksList) {
  const container = document.getElementById("book-list");
  if (booksList.length === 0) {
    container.innerHTML = "<p style='text-align:center; color:#8a7a66; grid-column: 1/-1; padding: 40px 0;'>🔍 沒有找到符合條件的二手書。</p>";
    return;
  }
  container.innerHTML = "";

  booksList.forEach(book => {
    const priceHTML = book.price && book.price > 0
        ? `<strong style="font-size: 16px; color: #a89072;">NT$${book.price}</strong>`
        : `<strong style="font-size: 16px; color: #a89072;">價格請洽詢</strong>`;

    const contactUrl = book.line_id || "";
    let btnText = "💬 聯絡賣家";
    let btnBgColor = "#43392f";
    let isEmail = false;
    let emailAddress = "";

    if (contactUrl.includes("line.me")) { btnText = "💬 LINE 聯絡"; btnBgColor = "#06C755"; }
    else if (contactUrl.includes("facebook.com")) { btnText = "👤 FB 聯絡"; btnBgColor = "#1877F2"; }
    else if (contactUrl.includes("instagram.com")) { btnText = "📸 IG 聯絡"; btnBgColor = "#E1306C"; }
    else if (contactUrl.includes("tel:")) { btnText = "📞 電話聯絡"; btnBgColor = "#007AFF"; }
    else if (contactUrl.includes("mailto:")) {
      isEmail = true;
      emailAddress = contactUrl.replace("mailto:", "");
      btnText = "✉️ 複製信箱";
      btnBgColor = "#64748B";
    }

    const clickHandler = isEmail ? `copyEmail('${emailAddress}', this)` : `goToContact('${contactUrl}')`;

    container.innerHTML += `
      <div class="book-card">
        <div class="book-image-wrapper">
          <span class="dept-badge">${book.department || "通識 / 其他"}</span>
          <img src="${book.image_url}" alt="${book.title}" loading="lazy">
        </div>
        <div class="book-info">
          <h3>${book.title}</h3>
          <div class="book-description-area">
            <p><strong>課程：</strong>${book.course_name || "未填寫"}</p>
            <p><strong>教授：</strong>${book.professor || "未填寫"}</p>
            <p><strong>校區：</strong>${book.campus || "未填寫"}</p>
            <p class="book-meta-desc">${book.description || "無備註說明。"}</p>
          </div>
          <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid #f8f5f0;">
            ${priceHTML}
            <p style="margin: 4px 0 0 0; font-size: 12px; color: #7a6c5a;">賣家：${book.seller_name || "未知"}</p>
            <button onclick="${clickHandler}" class="front-contact-btn" style="background-color: ${btnBgColor};">
              ${btnText}
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

// 修改後的專屬主動查詢邏輯
function executeSearch() {
  if (!isDataLoaded) return;

  const keyword = document.getElementById("searchBar").value.toLowerCase().trim();
  const selectedDept = document.getElementById("deptFilter").value;

  const filtered = allBooks.filter(book => {
    const matchesDept = (selectedDept === "ALL") || (book.department === selectedDept);
    
    const titleStr = book.title || "";
    const courseStr = book.course_name || "";
    const profStr = book.professor || "";
    const descStr = book.description || "";

    const matchesKeyword = !keyword || 
      titleStr.toLowerCase().includes(keyword) ||
      courseStr.toLowerCase().includes(keyword) ||
      profStr.toLowerCase().includes(keyword) ||
      descStr.toLowerCase().includes(keyword);

    return matchesDept && matchesKeyword;
  });

  renderBooks(filtered);
}

function resetFilters() {
  document.getElementById("searchBar").value = "";
  document.getElementById("deptFilter").value = "ALL";
  renderBooks(allBooks); // 重置時恢復完整顯示
}

function goToContact(url) {
  if (!url) { alert("抱歉，該賣家沒有提供有效的聯絡方式。"); return; }
  const link = document.createElement('a');
  link.href = url; link.target = '_blank'; link.click();
}

function copyEmail(email, btn) {
  navigator.clipboard.writeText(email).then(() => {
    const originalText = btn.innerText;
    btn.innerText = "✅ 複製成功！";
    setTimeout(() => { btn.innerText = originalText; }, 2000);
  }).catch(() => {
    alert(`賣家信箱為：${email}`);
  });
}

loadBooks();
</script>
</body>
</html>
